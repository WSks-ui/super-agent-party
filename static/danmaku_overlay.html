<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>弹幕提醒</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');
        
        body { 
            margin: 0; 
            padding: 0; 
            background-color: transparent; 
            overflow: hidden; 
            font-family: 'Noto Sans SC', sans-serif; 
        }

        #danmaku-container {
            /* 定位：初始位置拉得更远，防止大尺寸溢出 */
            position: absolute;
            top: -500px; 
            left: 50%;
            transform: translateX(-50%);
            
            /* 整体尺寸翻倍 */
            width: fit-content;
            min-width: 400px; /* 最小宽度增加一倍 */
            max-width: 90vw;
            background: rgba(15, 23, 42, 0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: #f1f5f9;
            padding: 24px 60px; /* 增加内边距 */
            
            /* 形状与边框 */
            border-radius: 0 0 40px 40px; /* 圆角翻倍 */
            border-bottom: 8px solid #38bdf8; /* 底部装饰条加粗 */
            border-left: 2px solid rgba(255,255,255,0.1);
            border-right: 2px solid rgba(255,255,255,0.1);
            
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            
            /* 动画：保持回弹感 */
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
            z-index: 999;
        }

        /* 激活状态 */
        #danmaku-container.show {
            top: 0px; 
            opacity: 1;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 5px;
        }

        .live-dot {
            width: 14px; /* 呼吸灯变大 */
            height: 14px;
            background-color: #38bdf8;
            border-radius: 50%;
            box-shadow: 0 0 15px #38bdf8;
            animation: pulse 1.5s infinite;
        }

        .title {
            font-size: 18px; /* 标题字号翻倍 */
            font-weight: 700;
            color: #7dd3fc;
            text-transform: uppercase;
            letter-spacing: 5px; /* 字间距加大 */
            opacity: 0.9;
        }

        .content {
            font-size: 32px; /* 正文字号大幅增加 (原22px -> 44px) */
            font-weight: 600;
            line-height: 1.4;
            text-align: center;
            word-wrap: break-word;
            text-shadow: 0 4px 12px rgba(0,0,0,0.3);
            /* 限制行数防止遮挡过多画面 */
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;

        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.4); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div id="danmaku-container">
        <div class="header">
            <div class="live-dot"></div>
            <div class="title">New Response</div>
        </div>
        <div class="content" id="danmaku-content"></div>
    </div>

    <script>
        const container = document.getElementById('danmaku-container');
        const contentEl = document.getElementById('danmaku-content');

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = protocol + '//' + window.location.host + '/ws/overlay';
            const ws = new WebSocket(wsUrl);

            ws.onmessage = function(event) {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.action === 'show') {
                        contentEl.textContent = msg.data.content || '';
                        container.classList.add('show');
                    } else if (msg.action === 'clear') {
                        container.classList.remove('show');
                    }
                } catch (e) {}
            };

            ws.onclose = function() {
                setTimeout(connect, 2000);
            };
        }

        connect();
    </script>
</body>
</html>
